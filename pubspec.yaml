name: offline_aac
description: "Reed — offline speech for people whose voice comes and goes."
publish_to: 'none'

# Android versionName / versionCode. Both overridable at build time with
# --build-name / --build-number.
version: 0.1.0+1

# A range, never an exact pin. The exact toolchain lives in .fvmrc, which CI
# reads; the tool `fvm` itself is not required or installed.
environment:
  sdk: ^3.12.2

# Nine direct dependencies. Every one is here because it cannot be written or
# faked in-process. The last three (archive, file_selector, share_plus) landed
# with E09-T01 export/import — the entire backup story once cloud backup is off.
# Before adding a tenth, run:
#
#   dart pub deps --json > /tmp/deps.json
#   python3 .claude/skills/reed-dependency-hygiene/scripts/audit_deps.py /tmp/deps.json
#
# It fails on anything that opens a network path, reports crashes or usage,
# drags in Firebase, or collects device identifiers — checking the resolved
# tree, not the pubspec, because the second hop is where those arrive.
# file_selector pulls `http` transitively (its platform interface); that adds no
# Android permission — verified by test/policy/no_internet_permission_test — but
# it is why the audit checks the resolved tree, not the pubspec.
dependencies:
  # ── Export/import: the ENTIRE backup story once cloud backup is off ────────
  # archive, share_plus and file_selector are here because none can be written
  # in-process, and each is audited against the manifest merger by
  # test/policy/no_internet_permission_test — the strongest asset the product has
  # is that the OS itself can prove there is no INTERNET permission, and a
  # share/picker plugin that merged one in would break that claim silently. They
  # sit in their alphabetical slots (sort_pub_dependencies) rather than grouped.
  #
  # archive: pure-Dart zip read/write, no platform channel, no network.
  archive: ^4.0.9

  # The iOS audio session category. `.playback`, never `.ambient` — the ambient
  # category lets the hardware silent switch mute the app, which means a user
  # flips their ringer switch for a meeting and loses their voice.
  audio_session: ^0.2.4

  drift: ^2.34.2

  # file_selector: the OS document picker for import. NOT file_picker, which is
  # heavier and has historically merged extra Android permissions; file_selector
  # is the flutter.dev-published, permission-light option. No URL scheme, ever.
  file_selector: ^1.1.0

  flutter:
    sdk: flutter

  # Pinned to 2.x deliberately. Every riverpod 3.x release declares `test`
  # (and flutter_riverpod declares `flutter_test`) as a RUNTIME dependency, which
  # drags the test framework, shelf, and web_socket_channel into the app's
  # dependency graph. 2.6.1 is clean, and the usage here — six plain providers,
  # no families, no scoping, no codegen — is 2.x-shaped anyway.
  flutter_riverpod: ^2.6.1

  flutter_tts: ^4.2.5

  path: ^1.9.1
  path_provider: ^2.1.6

  # share_plus: hands the finished export zip to the OS share sheet. The app
  # never sends the file — the user does, to a destination the app never sees or
  # names. No network path of its own.
  share_plus: ^10.1.4

  # NOT sqlite3_flutter_libs: that package is end-of-life as of Feb 2026
  # ("Not used anymore, update to version 3.x of package:sqlite3 instead") and
  # its final release is an empty tombstone. sqlite3 3.x supplies the native
  # library through Dart build hooks instead of the Flutter plugin mechanism.
  sqlite3: ^3.4.0

dev_dependencies:
  # Required by drift_dev. It pulls shelf and web_socket_channel for its
  # watch-mode server; those are build-only and never reach the APK, which is
  # why the dependency audit separates what ships from what builds.
  build_runner: ^2.15.1

  drift_dev: ^2.34.4

  flutter_test:
    sdk: flutter

  # The lint set. The include line in analysis_options.yaml is version-pinned to
  # this major and must move with it.
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true

  # The typeface is bundled, never fetched. A runtime font download would put a
  # network path into an app whose entire claim is that it has none.
  #
  # One variable file, one axis (wght 200-800), upright only. Italic is a
  # separate file and is not shipped: it has no role here, doubles the payload,
  # and FontVariation('ital', 1) would silently no-op against this font.
  fonts:
    - family: AtkinsonHyperlegibleNext
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegibleNext-VF.ttf

  assets:
    - assets/fonts/OFL.txt
    # The privacy policy is bundled so the in-app viewer shows the exact same
    # text as the hosted page (Apple 5.1.1(i) needs the link inside the app),
    # loaded offline. One source of truth; no drift.
    - legal/privacy-policy.md
