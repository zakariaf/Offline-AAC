version: 2
updates:
  # Dart / Flutter packages. Ranges are caret; the lock is committed. Every
  # bump still runs the dependency audit and the no-INTERNET policy tests in CI.
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

  # GitHub Actions — keep the pinned action versions in ci.yml patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
