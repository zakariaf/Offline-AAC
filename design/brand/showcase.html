<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @font-face{font-family:'Atkinson';src:url('../AtkinsonHyperlegibleNext-VF.ttf');font-weight:200 800;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1600px;height:1080px;background:#EFE9DE;font-family:'Atkinson',sans-serif;padding:64px}
  h1{font-size:34px;font-weight:700;color:#1A140D;letter-spacing:-0.5px}
  .sub{font-size:20px;color:#6F6A64;margin-top:6px;margin-bottom:40px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:36px}
  .card{border-radius:28px;padding:44px;display:flex;align-items:center;justify-content:center;gap:40px}
  .paper{background:#FAF5EC}.ink{background:#1A140D}
  .ico{width:196px;height:196px;border-radius:44px}
  .wm{height:150px;width:auto}
  .cap{font-size:17px;color:#8A857F;margin-top:14px;text-align:center}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head><body>
  <h1>Reed — brand mark</h1>
  <div class="sub">A bulrush reed: the vibrating tongue that gives an instrument its voice, and the reed pen that first carried writing.</div>
  <div class="grid">
    <div class="col"><div class="card paper"><img class="ico" src="reed-icon-light-1024.png"></div><div class="cap">app icon — light</div></div>
    <div class="col"><div class="card ink"><img class="ico" src="reed-icon-1024.png"></div><div class="cap">app icon — ink</div></div>
    <div class="col"><div class="card paper"><img class="wm" src="reed-wordmark-light.png"></div><div class="cap">wordmark — light</div></div>
    <div class="col"><div class="card ink"><img class="wm" src="reed-wordmark-dark.png"></div><div class="cap">wordmark — ink</div></div>
  </div>
</body></html>
