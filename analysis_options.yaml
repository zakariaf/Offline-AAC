# =============================================================================
# analysis_options.yaml — Offline AAC
#
# WHY THIS FILE IS STRICTER THAN NORMAL:
# This app ships with NO telemetry. No Crashlytics, no Sentry, no analytics.
# The consequence: we will NEVER learn that the app crashed in the field, and
# nobody will file a bug — our users are, by definition, unable to speak when
# the app fails them. The analyzer and the test suite are the ONLY two things
# between a defect and a user tapping "I need to leave" and hearing NOTHING.
#
# Every promotion to `error` below is a bug class that produces SILENCE.
#
# VERIFIED against the SDK actually installed on this machine:
#   Dart 3.12.2 / Flutter 3.44.6 (stable, verified 2026-07-15)
#   very_good_analysis 10.3.0 (requires Dart ^3.12.0 — satisfied since the
#     3.44.6 upgrade; the earlier 10.2.0 pin existed only for Dart 3.11)
#   riverpod_lint 3.1.3
# This exact file was run through `flutter analyze` on a probe project.
# =============================================================================

# VGA 10.3.0 already sets strict-casts + strict-inference +
# strict-raw-types, so there is no `language:` block below — it would be
# redundant. The version-pinned include (not the bare analysis_options.yaml)
# is deliberate: on a project that may be ABANDONED, a `pub upgrade` must
# never silently change what counts as an error.
#
# NOTE: the include filename must
# match a file that exists in the resolved package or you get a silent
# `include_file_not_found` WARNING and lose all 212 rules. Check with:
#   ls ~/.pub-cache/hosted/pub.dev/very_good_analysis-*/lib/
include: package:very_good_analysis/analysis_options.10.3.0.yaml

analyzer:
  exclude:
    # Generated code. drift regenerates it on every schema change; we don't
    # own its style. Safe to exclude BECAUSE migration correctness is enforced
    # by drift's schema tests, not by lints.
    - "**/*.g.dart"          # drift, json_serializable
    - "**/*.drift.dart"      # drift
    - "**/generated_plugin_registrant.dart"
    - "test/.test_coverage.dart"
    # drift's exported schema snapshots for migration tests. Historical
    # artifacts — they must NOT be reformatted or "fixed".
    - "test/drift/generated/**"

  errors:
    # ---------------------------------------------------------------------
    # TIER 1 — THE SILENCE BUGS. A dropped Future is a phrase never spoken.
    # Both rules are already ON in VGA at info level; promoted to error here
    # because for this app they are not style, they are the product failing.
    #
    # !! READ THIS — THE HOLE THESE RULES DO NOT COVER !!
    # Verified empirically on Dart 3.11 (re-check on 3.12): `onTap: () => tts.speak('x')` is
    # NOT flagged by either rule. The arrow closure *returns* the Future, so
    # discarded_futures considers it returned — but it is being assigned to a
    # VoidCallback, so the Future is dropped and errors vanish. This is the
    # most idiomatic way to wire a Flutter tile and the lint cannot see it.
    #
    # MITIGATION (structural, not disciplinary): SpeechController exposes a
    # VOID-returning `speakNow(String)` that internally does
    # `unawaited(_speak(p).catchError(...))`. onTap never touches a Future,
    # so the hole is unreachable by construction. Verified: analyzes clean.
    # Never let a Future-returning method be called directly from a callback.
    # ---------------------------------------------------------------------
    unawaited_futures: error       # unawaited Future inside an async body
    discarded_futures: error       # Future-returning call in a SYNC body

    # ---------------------------------------------------------------------
    # TIER 2 — SWALLOWED FAILURE. flutter_tts returns 0 and writes only a
    # Log.d on failure. If we also swallow the exception, failure is
    # invisible at every layer and the user just gets silence.
    # ---------------------------------------------------------------------
    empty_catches: error
    avoid_catches_without_on_clauses: error   # VGA has it; promoted
    only_throw_errors: error
    throw_in_finally: error        # silently replaces the real exception

    # ---------------------------------------------------------------------
    # TIER 3 — ASYNC + UI. The async-gap BuildContext bug: after an `await`,
    # the widget may have been disposed, so `context` is dead. Live hazard in
    # edit mode (await a drift write, then pop the dialog).
    # ---------------------------------------------------------------------
    use_build_context_synchronously: error

    # ---------------------------------------------------------------------
    # TIER 4 — RESOURCE LEAKS.
    # NOTE close_sinks: VGA explicitly sets this to `ignore`. We are
    # overriding VGV here on purpose — we hold a StreamController for TTS
    # voice-availability changes, and a leaked one that fires on a disposed
    # notifier is a real fault on the crisis path.
    # ---------------------------------------------------------------------
    cancel_subscriptions: error
    close_sinks: error

    # ---------------------------------------------------------------------
    # TIER 5 — TYPE HOLES. Everything crossing a platform channel is dynamic:
    # Personal Voice (iOS), the Android QS TileService, the iOS ControlWidget
    # all hand us Map<Object?, Object?>. An unguarded dynamic call there
    # throws at runtime, on a device, with no telemetry to tell us.
    # ---------------------------------------------------------------------
    avoid_dynamic_calls: error
    always_declare_return_types: error
    cast_nullable_to_non_nullable: error

    # ---------------------------------------------------------------------
    # TIER 6 — EXHAUSTIVENESS.
    # Non-exhaustive switches on SEALED classes are already a COMPILE ERROR
    # (`non_exhaustive_switch_statement`) — verified. No lint required, and
    # that is the main reason to model SpeechFailure / OutputMode as sealed
    # classes rather than enums: adding a new failure mode then breaks the
    # build at every call site instead of falling through to silence.
    # This lint only covers the enum / static-const-instance cases.
    # ---------------------------------------------------------------------
    exhaustive_cases: error

    # ---------------------------------------------------------------------
    # TIER 7 — SHIPPING HYGIENE. Promoted so CI catches them; there is no
    # reviewer on a solo project.
    # ---------------------------------------------------------------------
    avoid_print: error             # no stdout logging; use the on-device
                                   # exportable crash log instead
    avoid_slow_async_io: error     # tile images are files on disk, read near
                                   # the render path
    deprecated_member_use: warning # NOT error: never let a Flutter upgrade
    deprecated_member_use_from_same_package: warning  # block a hotfix

    # ---------------------------------------------------------------------
    # DELIBERATE DOWNGRADES — proportionality for a solo dev, 2-week MVP.
    # ---------------------------------------------------------------------
    # VGA enables this for PACKAGE authors. This is an app. A doc comment on
    # every public member is ceremony that buys nothing here and would cost
    # hours. Readability for the future maintainer comes from doc comments on
    # the SEAMS (SpeechService, repositories, migration steps) — enforced by
    # taste and CONTRIBUTING.md, not by lint.
    public_member_api_docs: ignore
    # The formatter already wraps code. As a lint this only fires on things
    # the formatter CANNOT split: long string literals and URLs in comments.
    lines_longer_than_80_chars: ignore

# VGA 10.3.0 enables almost everything this project wants — discarded_futures,
# prefer_const_constructors, cancel_subscriptions, only_throw_errors,
# avoid_slow_async_io, exhaustive_cases. (flutter_lints 5.0.0 *removed* the
# prefer_const_* rules; VGA keeps them, which is one more reason to prefer VGA
# here: zero animation is a design rule, so every const-able tile subtree
# should be const.)
# To DISABLE a VGA rule, use `analyzer: errors: <rule>: ignore` above.
#
# The block below exists because of one hard-won fact: an `errors:` entry only
# changes the SEVERITY of a diagnostic that is already being produced. It cannot
# turn a rule on. VGA does not enable close_sinks at all — it only names it in
# its own `errors:` as `ignore` — so `close_sinks: error` above was a silent
# no-op until this block landed. Verified by positive control: a class holding
# an unclosed StreamController produced NO diagnostic before, and errors now.
#
# The lesson generalises: after promoting any rule to `error`, write a file that
# violates it and confirm the analyzer complains. Green is not evidence.
linter:
  rules:
    - close_sinks
# Do NOT write `- rule: false` under `linter: rules:` — mixing the list and map
# forms is a config parse error.

# -----------------------------------------------------------------------------
# ANALYZER PLUGINS — first-party plugin system (Dart 3.10+).
#
# riverpod_lint 3.x migrated OFF custom_lint onto `analysis_server_plugin`.
# This is verified working: `missing_provider_scope` is reported by a plain
# `flutter analyze` with NO custom_lint dependency and NO `dart run custom_lint`
# second pass. Do NOT add custom_lint to this project — the Dart team has
# scheduled deprecation of the legacy plugin system (custom_lint's foundation)
# as early as Dart 3.12, i.e. the next SDK.
#
# Syntax note (verified): with a pub version you must use the `version:` key.
# `riverpod_lint: ^3.1.3` followed by nested `diagnostics:` is a YAML parse
# error — a scalar cannot also have children.
#
# Plugin-defined WARNINGS are on by default; plugin-defined LINTS are OFF by
# default and must be opted into here.
# -----------------------------------------------------------------------------
# riverpod_lint is NOT enabled here, and this block documents why rather than
# leaving a plausible-looking config that silently does nothing.
#
# riverpod_lint 3.x depends on `riverpod: 3.3.2` — an EXACT version, not a
# range. This app pins flutter_riverpod to ^2.6.1 on purpose: every riverpod 3.x
# release declares `test` (and flutter_riverpod declares `flutter_test`) as a
# RUNTIME dependency, which drags the test framework, shelf, and
# web_socket_channel into the shipping dependency graph of an app whose entire
# claim is that it has no network path. The two are mutually exclusive.
#
# The pin wins. Riverpod is not load-bearing here — six plain providers, no
# families, no scoping, no codegen — so riverpod_lint's best rule
# (missing_provider_scope) guards a one-time mistake that throws on the first
# tap in any case. A clean, auditable dependency graph is worth more than a lint
# for a mistake that cannot survive one run of the app.
#
# VERIFIED, and this is why the block is gone rather than commented hopefully:
# with `plugins: riverpod_lint: version: ^3.1.3` present, a file declaring a
# Provider and calling runApp() WITHOUT a ProviderScope produced NO diagnostic.
# The analyzer silently ignores a plugin it cannot resolve. A config that
# declares a plugin which never runs is worse than no config: it reports success
# it did not earn.
#
# If riverpod 3.x ever moves `test` back to dev_dependencies, revisit both
# decisions together — they are one decision, not two.

# -----------------------------------------------------------------------------
# FORMATTER (Dart 3.7+ "tall style").
#
# Style is chosen by the language version in pubspec.yaml, NOT by config. We
# are on Dart 3.12, so tall style is automatic — there is nothing to opt into.
#
# trailing_commas: preserve — VGA already sets this; restated for the reader.
# A trailing comma forces a split. The default ("automate") lets the formatter
# add/remove commas and collapse widget trees onto one line. For a widget tree
# describing a 3x4 grid that a stranger must read cold, one-argument-per-line
# is worth the vertical space, and it keeps grid-layout diffs minimal.
# -----------------------------------------------------------------------------
formatter:
  page_width: 80
  trailing_commas: preserve
